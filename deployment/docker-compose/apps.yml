name: 'microservices-store'
services:
  catalog-service:
    image: alexandrecoulon/store-catalog-service
    container_name: catalog-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      # Fill the hostname part with the database container's name
      - DB_URL=jdbc:postgresql://catalog-db:5432/postgres
      # Spring Boot also allows you to directly set a variable in `application.properties`
      # if it matches and is written in uppercase with underscores, e.g. for `spring.datasource.url`:
      #- SPRING_DATASOURCE_URL=jdbc:postgresql://catalog-db:5432/postgres
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
    ports:
      - "8081:8081"
    restart: unless-stopped
    depends_on:
      catalog-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 700m
